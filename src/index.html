<!doctype html>
<html lang="es" data-theme="dark" data-density="comfortable">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('pos_ui_theme');
          document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..800&display=swap"
      rel="stylesheet" />
    <title>Luxora POS · Terminal de venta</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <pos-root></pos-root>
  </body>
</html>
